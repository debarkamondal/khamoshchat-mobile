name: Build Android APK

on:
  release:
    types: [published]

  # Allow manual trigger for testing the workflow
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Expo & EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build APK locally
        run: eas build --platform android --profile preview --local --non-interactive --output ./khamoshchat.apk

      - name: Rename APK with version
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          mv khamoshchat.apk "khamoshchat-${VERSION}.apk"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: khamoshchat-apk
          path: khamoshchat-*.apk
          retention-days: 30

      - name: Attach APK to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: khamoshchat-*.apk
